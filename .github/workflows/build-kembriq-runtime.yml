name: Build Kembriq Runtime

on:
  workflow_dispatch:
    inputs:
      package_set:
        description: "Package set to build"
        required: true
        type: choice
        default: base
        options:
          - base
          - git-python
          - node
          - all
          - custom
      packages:
        description: "Space-separated packages when package_set=custom"
        required: false
        default: ""
      build_bootstrap:
        description: "Build kembriq-runtime-base bootstrap zip (slow; enable only for bootstrap/patch changes)"
        required: true
        type: boolean
        default: false
      publish_pages:
        description: "Commit built .deb files and APT metadata to GitHub Pages"
        required: true
        type: boolean
        default: true
      fail_on_termux_refs:
        description: "Fail if artifacts contain com.termux or /data/data/com.termux"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.package_set }}
  cancel-in-progress: true

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout APT repo
        uses: actions/checkout@v4
        with:
          path: apt-repo

      - name: Prepare host
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y arj binutils curl dpkg-dev git jq python3 unzip xz-utils zip zstd
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL /opt/ghc || true
          df -h

      - name: Clone termux-packages
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/termux/termux-packages.git termux-packages

      - name: Patch termux-packages for Kembriq
        run: |
          set -euo pipefail
          chmod +x apt-repo/scripts/*.sh
          apt-repo/scripts/patch-termux-for-kembriq.sh termux-packages
          grep -n 'TERMUX_APP__PACKAGE_NAME=' termux-packages/scripts/properties.sh
          grep -n 'TERMUX__ROOTFS=' termux-packages/scripts/properties.sh
          grep -n 'TERMUX_PKG_DEPENDS=' termux-packages/packages/termux-tools/build.sh
          ! grep -n 'termux-am' termux-packages/packages/termux-tools/build.sh
          ! grep -n 'command-not-found' termux-packages/scripts/build-bootstraps.sh
          grep -n 'PACKAGES+=("libbz2")' termux-packages/scripts/build-bootstraps.sh
          ! grep -n 'PACKAGES+=("bzip2")' termux-packages/scripts/build-bootstraps.sh
          grep -n 'kembriq_sanitize_termux_exec_sources' termux-packages/packages/termux-exec/build.sh
          grep -n 'kembriq_sanitize_termux_exec_tree "$TERMUX_PKG_MASSAGEDIR"' termux-packages/packages/termux-exec/build.sh

      - name: Resolve package set
        id: packages
        env:
          PACKAGE_SET: ${{ inputs.package_set }}
          CUSTOM_PACKAGES: ${{ inputs.packages }}
        run: |
          set -euo pipefail
          case "$PACKAGE_SET" in
            base)
              packages=""
              ;;
            git-python)
              packages="git python python-pip python-venv"
              ;;
            node)
              packages="nodejs-lts npm"
              ;;
            all)
              packages="git python python-pip python-venv nodejs-lts curl wget tar gzip unzip ripgrep fd jq"
              ;;
            custom)
              packages="$CUSTOM_PACKAGES"
              ;;
            *)
              echo "Unknown package_set: $PACKAGE_SET" >&2
              exit 64
              ;;
          esac
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Resolved packages: ${packages:-<bootstrap base only>}"

      - name: Build bootstrap base
        if: ${{ inputs.build_bootstrap }}
        run: |
          set -euo pipefail
          cd termux-packages
          mkdir -p output
          sudo chmod -R a+rwX .
          ./scripts/run-docker.sh ./scripts/build-bootstraps.sh --architectures aarch64

      - name: Collect bootstrap base
        if: ${{ inputs.build_bootstrap }}
        run: |
          set -euo pipefail
          candidate="$(find termux-packages -maxdepth 4 -type f -name 'bootstrap-aarch64.zip' -print -quit || true)"
          if [ -z "$candidate" ]; then
            echo "bootstrap-aarch64.zip was not produced." >&2
            exit 1
          fi
          if [ "$candidate" != "termux-packages/bootstrap-aarch64.zip" ]; then
            cp -f "$candidate" termux-packages/bootstrap-aarch64.zip
          fi
          test -s termux-packages/bootstrap-aarch64.zip

      - name: Build selected packages
        if: ${{ steps.packages.outputs.packages != '' }}
        run: |
          set -euo pipefail
          cd termux-packages
          read -r -a packages <<< "${{ steps.packages.outputs.packages }}"
          ./scripts/run-docker.sh ./build-package.sh -f -a aarch64 "${packages[@]}"

      - name: Sanitize generated Kembriq artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(termux-packages/output/*.deb)
          if [ -f termux-packages/bootstrap-aarch64.zip ]; then
            artifacts+=(termux-packages/bootstrap-aarch64.zip)
          fi
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No artifacts to sanitize." >&2
            exit 1
          fi
          apt-repo/scripts/sanitize-kembriq-artifacts.sh "${artifacts[@]}"

      - name: Scan Kembriq artifacts
        if: ${{ inputs.fail_on_termux_refs }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(termux-packages/output/*.deb)
          if [ -f termux-packages/bootstrap-aarch64.zip ]; then
            artifacts+=(termux-packages/bootstrap-aarch64.zip)
          fi
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No artifacts to scan." >&2
            exit 1
          fi
          apt-repo/scripts/scan-kembriq-artifacts.sh "${artifacts[@]}"

      - name: Publish bootstrap release asset
        if: ${{ inputs.publish_pages && inputs.build_bootstrap }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          test -s termux-packages/bootstrap-aarch64.zip
          tag="runtime-base-${GITHUB_RUN_ID}"
          asset_dir="$(mktemp -d)"
          asset="$asset_dir/kembriq-runtime-base-aarch64.zip"
          cp termux-packages/bootstrap-aarch64.zip "$asset"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" \
              --title "Kembriq runtime base ${GITHUB_RUN_ID}" \
              --notes "Bootstrap generated by Build Kembriq Runtime run ${GITHUB_RUN_ID}." \
              --latest=false
          fi

      - name: Publish APT pages content
        if: ${{ inputs.publish_pages }}
        env:
          KEMBRIQ_BOOTSTRAP_URL: https://github.com/${{ github.repository }}/releases/download/runtime-base-${{ github.run_id }}/kembriq-runtime-base-aarch64.zip
        run: |
          set -euo pipefail
          bootstrap=""
          if [ -f termux-packages/bootstrap-aarch64.zip ]; then
            bootstrap="$(realpath termux-packages/bootstrap-aarch64.zip)"
          fi
          apt-repo/scripts/publish-apt-pages.sh apt-repo termux-packages/output "$bootstrap"

      - name: Upload build artifacts
        if: always()
        run: |
          set -euo pipefail
          mkdir -p upload
          if [ -d termux-packages/output ]; then
            tar -cf upload/kembriq-runtime-output.tar -C termux-packages output
          fi
          if [ -f termux-packages/bootstrap-aarch64.zip ]; then
            cp termux-packages/bootstrap-aarch64.zip upload/
          fi
          if [ -f apt-repo/artifacts/bootstrap/kembriq-runtime-base-aarch64.json ]; then
            cp apt-repo/artifacts/bootstrap/kembriq-runtime-base-aarch64.json upload/
          fi
          if [ -f apt-repo/dists/stable/main/binary-aarch64/Packages ]; then
            cp apt-repo/dists/stable/main/binary-aarch64/Packages upload/
          fi
          if [ -f apt-repo/dists/stable/Release ]; then
            cp apt-repo/dists/stable/Release upload/
          fi

      - name: Upload build artifacts archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kembriq-runtime-aarch64-${{ github.run_id }}
          path: upload/
          if-no-files-found: ignore

      - name: Commit published repo
        if: ${{ inputs.publish_pages }}
        working-directory: apt-repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dists pool README.md .nojekyll scripts .github
          if compgen -G "artifacts/bootstrap/*.json" >/dev/null; then
            git add artifacts/bootstrap/*.json
          fi
          if compgen -G "artifacts/bootstrap/*.sha256" >/dev/null; then
            git add artifacts/bootstrap/*.sha256
          fi
          git restore --staged artifacts/bootstrap/*.zip 2>/dev/null || true
          oversized=""
          while IFS= read -r path; do
            [ -f "$path" ] || continue
            size="$(stat -c%s "$path")"
            if [ "$size" -gt 100000000 ]; then
              oversized="${oversized}${size} ${path}"$'\n'
            fi
          done < <(git diff --cached --name-only)
          if [ -n "$oversized" ]; then
            echo "Refusing to commit files over GitHub's 100 MB limit:" >&2
            printf "%s" "$oversized" >&2
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No APT repo changes to commit."
          else
            git commit -m "Publish Kembriq runtime packages"
            git pull --rebase origin main
            git push
          fi
