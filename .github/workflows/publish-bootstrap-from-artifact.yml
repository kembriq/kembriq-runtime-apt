name: Publish Runtime Bootstrap From Artifact

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Build run id that uploaded kembriq-runtime-aarch64-<run_id>"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download build artifact
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p downloaded
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "kembriq-runtime-aarch64-$SOURCE_RUN_ID" \
            --dir downloaded
          ls -lh downloaded
          test -s downloaded/bootstrap-aarch64.zip
          test -s downloaded/kembriq-runtime-base-aarch64.json

      - name: Publish bootstrap zip as release asset
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          tag="runtime-base-$SOURCE_RUN_ID"
          asset="downloaded/kembriq-runtime-base-aarch64.zip"
          cp -f downloaded/bootstrap-aarch64.zip "$asset"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Kembriq runtime base $SOURCE_RUN_ID" \
              --notes "Bootstrap base generated by workflow run $SOURCE_RUN_ID."
          fi
          gh release upload "$tag" "$asset" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish small Pages manifest
        env:
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          tag="runtime-base-$SOURCE_RUN_ID"
          mkdir -p artifacts/bootstrap
          cp -f downloaded/kembriq-runtime-base-aarch64.json artifacts/bootstrap/kembriq-runtime-base-aarch64.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = Path("artifacts/bootstrap/kembriq-runtime-base-aarch64.json")
          data = json.loads(manifest.read_text(encoding="utf-8"))
          tag = f"runtime-base-{os.environ['SOURCE_RUN_ID']}"
          data["url"] = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{tag}/kembriq-runtime-base-aarch64.zip"
          manifest.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY
          sha256sum downloaded/bootstrap-aarch64.zip > artifacts/bootstrap/kembriq-runtime-base-aarch64.zip.sha256
          sed -i 's#downloaded/bootstrap-aarch64.zip#kembriq-runtime-base-aarch64.zip#' artifacts/bootstrap/kembriq-runtime-base-aarch64.zip.sha256
          git rm -f --ignore-unmatch artifacts/bootstrap/kembriq-runtime-base-aarch64.zip
          git add artifacts/bootstrap/kembriq-runtime-base-aarch64.json artifacts/bootstrap/kembriq-runtime-base-aarch64.zip.sha256
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "Publish bootstrap manifest from artifact $SOURCE_RUN_ID"
            git push
          fi